<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Rocket Launch!</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Bubblegum+Sans&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: 'Bubblegum Sans', cursive;
    background: linear-gradient(180deg, #87ceeb 0%, #bae6fd 40%, #f0f9ff 70%, #d9f99d 100%);
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
    position: relative;
    overflow: hidden;
    transition: background 2s ease-in-out;
  }
  body.space {
    background: linear-gradient(180deg, #020617 0%, #1e1b4b 50%, #312e81 100%);
  }

  /* clouds, sun, stars */
  .sky-deco {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
    transition: opacity 1s;
  }
  body.space .sky-deco { opacity: 0; }

  .sun {
    position: absolute;
    top: 8%;
    right: 8%;
    font-size: clamp(50px, 8vw, 90px);
    animation: sunSpin 12s linear infinite;
  }
  @keyframes sunSpin { to { transform: rotate(360deg); } }

  .cloud-bg {
    position: absolute;
    font-size: clamp(40px, 6vw, 70px);
    opacity: 0.85;
    animation: cloudDrift 40s linear infinite;
  }
  .cloud-bg:nth-of-type(2) { top: 15%; left: -10%; animation-delay: -8s; }
  .cloud-bg:nth-of-type(3) { top: 30%; left: -10%; font-size: clamp(30px, 5vw, 50px); opacity: 0.65; animation-delay: -22s; animation-duration: 55s; }
  .cloud-bg:nth-of-type(4) { top: 22%; left: -10%; animation-delay: -32s; animation-duration: 48s; opacity: 0.7; }
  @keyframes cloudDrift {
    0% { transform: translateX(0); }
    100% { transform: translateX(120vw); }
  }

  .space-deco {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    opacity: 0;
    transition: opacity 1.5s;
  }
  body.space .space-deco { opacity: 1; }
  .space-star {
    position: absolute;
    color: white;
    font-size: clamp(14px, 2vw, 22px);
    animation: starTwinkle 2s ease-in-out infinite;
  }
  @keyframes starTwinkle {
    0%,100% { opacity: 0.3; transform: scale(0.7); }
    50% { opacity: 1; transform: scale(1.2); }
  }

  /* streaking stars during launch */
  .streak {
    position: fixed;
    color: white;
    font-size: 20px;
    z-index: 2;
    animation: streak 0.6s linear forwards;
    pointer-events: none;
  }
  @keyframes streak {
    0% { opacity: 1; transform: translateY(-100vh); }
    100% { opacity: 1; transform: translateY(100vh); }
  }

  /* HUD */
  .hud {
    position: fixed;
    top: 14px;
    left: 14px;
    background: white;
    border: 4px solid #f59e0b;
    border-radius: 22px;
    padding: 8px 18px;
    font-family: 'Lilita One', sans-serif;
    font-size: clamp(18px, 3.5vw, 26px);
    color: #b45309;
    z-index: 20;
    box-shadow: 0 5px 0 #00000022;
    min-height: 56px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  body.space .hud { background: #1e1b4b; color: #fde68a; border-color: #facc15; }

  /* FUEL GAUGE */
  .gauge-wrap {
    position: fixed;
    right: clamp(18px, 4vw, 40px);
    top: 50%;
    transform: translateY(-50%);
    z-index: 15;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .gauge-label {
    font-family: 'Lilita One', sans-serif;
    font-size: clamp(16px, 3vw, 22px);
    color: #b45309;
    text-shadow: 2px 2px 0 #fde68a;
    text-align: center;
    line-height: 1;
  }
  body.space .gauge-label { color: #fde68a; text-shadow: 2px 2px 0 #00000088; }
  .gauge {
    width: clamp(40px, 9vw, 68px);
    height: clamp(280px, 50vh, 420px);
    background: white;
    border: 6px solid #b45309;
    border-radius: 24px;
    overflow: hidden;
    position: relative;
    box-shadow: inset 0 0 0 3px #fde68a, 0 8px 0 #00000022, 0 14px 30px #00000022;
  }
  .gauge-fill {
    position: absolute;
    bottom: 0;
    left: 0; right: 0;
    height: 0%;
    background: linear-gradient(180deg, #fde68a 0%, #fbbf24 30%, #f97316 70%, #ef4444 100%);
    transition: height 0.18s ease-out;
    box-shadow: inset 0 4px 0 #ffffff66;
  }
  .gauge-fill::before {
    content: '🔥';
    position: absolute;
    top: -8px;
    left: 50%;
    transform: translateX(-50%);
    font-size: clamp(24px, 4vw, 32px);
    line-height: 1;
  }

  /* tap zone covers most of the screen */
  .tap-zone {
    position: fixed;
    inset: 0;
    z-index: 10;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  /* SCENE */
  .scene {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 60vh;
    z-index: 5;
    pointer-events: none;
  }

  /* ground */
  .ground {
    position: absolute;
    bottom: 0;
    left: 0; right: 0;
    height: 14%;
    background: linear-gradient(180deg, #84cc16 0%, #65a30d 100%);
    z-index: 1;
    transition: opacity 1.5s, background 1.5s;
  }
  body.space .ground {
    background: linear-gradient(180deg, #d6d3d1 0%, #a8a29e 100%);
  }

  .pad {
    position: absolute;
    bottom: 13%;
    left: 50%;
    transform: translateX(-50%);
    width: clamp(120px, 22vw, 200px);
    height: clamp(18px, 3vw, 30px);
    background: linear-gradient(180deg, #57534e, #292524);
    border-radius: 8px;
    z-index: 2;
    box-shadow: 0 4px 0 #00000044;
  }
  .pad::before, .pad::after {
    content: '';
    position: absolute;
    bottom: -28px;
    width: 12px;
    height: 28px;
    background: #44403c;
  }
  .pad::before { left: 20px; }
  .pad::after { right: 20px; }

  /* rocket */
  .rocket {
    position: absolute;
    left: 50%;
    bottom: 15%;
    transform: translateX(-50%);
    font-size: clamp(80px, 18vw, 160px);
    line-height: 1;
    z-index: 6;
    filter: drop-shadow(0 6px 6px #00000044);
    transition: bottom 4s cubic-bezier(.5,0,.7,.5), transform 0.05s;
  }
  .rocket.shake1 { animation: shake1 0.15s infinite; }
  .rocket.shake2 { animation: shake2 0.1s infinite; }
  .rocket.shake3 { animation: shake3 0.07s infinite; }
  @keyframes shake1 {
    0%, 100% { transform: translateX(calc(-50% - 1px)); }
    50% { transform: translateX(calc(-50% + 1px)); }
  }
  @keyframes shake2 {
    0% { transform: translate(calc(-50% - 3px), 0) rotate(-2deg); }
    50% { transform: translate(calc(-50% + 3px), -2px) rotate(2deg); }
    100% { transform: translate(calc(-50% - 3px), 0) rotate(-2deg); }
  }
  @keyframes shake3 {
    0% { transform: translate(calc(-50% - 5px), -1px) rotate(-3deg); }
    33% { transform: translate(calc(-50% + 5px), -3px) rotate(3deg); }
    66% { transform: translate(calc(-50% - 4px), -2px) rotate(-2deg); }
    100% { transform: translate(calc(-50% + 4px), -1px) rotate(2deg); }
  }

  /* flames */
  .flames {
    position: absolute;
    left: 50%;
    bottom: 14%;
    transform: translateX(-50%);
    z-index: 5;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .flames .flame {
    font-size: clamp(40px, 8vw, 70px);
    line-height: 0.7;
    animation: flicker 0.15s infinite alternate;
  }
  .flames .smoke {
    font-size: clamp(40px, 7vw, 60px);
    margin-top: -10px;
    opacity: 0.7;
    animation: flicker 0.3s infinite alternate;
  }
  @keyframes flicker {
    0% { transform: scaleY(1) scaleX(1); filter: brightness(1); }
    100% { transform: scaleY(1.2) scaleX(0.9); filter: brightness(1.3); }
  }

  /* moon */
  .moon {
    position: absolute;
    bottom: 13%;
    left: 50%;
    transform: translateX(-50%) scale(0);
    width: clamp(160px, 36vw, 320px);
    height: clamp(80px, 18vw, 160px);
    background: radial-gradient(ellipse at 35% 35%, #f5f5f4 0%, #d6d3d1 50%, #a8a29e 100%);
    border-radius: 50% 50% 0 0;
    box-shadow: inset -20px -10px 30px #00000033;
    z-index: 1;
    transition: transform 0.8s cubic-bezier(.34,1.56,.64,1);
  }
  .moon::before {
    content: '🌑';
    display: none;
  }
  .moon-craters {
    position: absolute;
    inset: 0;
  }
  .moon-craters span {
    position: absolute;
    background: #a8a29e;
    border-radius: 50%;
    box-shadow: inset 0 -2px 2px #00000055;
  }
  body.space .moon { transform: translateX(-50%) scale(1); }

  /* flag */
  .flag {
    position: absolute;
    bottom: 27%;
    left: 50%;
    transform: translateX(-50%) scale(0);
    font-size: clamp(60px, 10vw, 90px);
    z-index: 7;
    transition: transform 0.6s cubic-bezier(.34,1.78,.64,1);
  }
  .flag.show { transform: translateX(-50%) scale(1) rotate(0deg); }

  /* "Launch Again" button */
  .relaunch {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%) scale(0);
    font-family: 'Lilita One', sans-serif;
    font-size: clamp(24px, 5vw, 36px);
    padding: 18px 40px;
    border: 6px solid #15803d;
    border-radius: 30px;
    background: linear-gradient(180deg, #4ade80, #22c55e);
    color: white;
    cursor: pointer;
    box-shadow: 0 8px 0 #15803d, 0 12px 30px #00000033;
    text-shadow: 2px 2px 0 #00000044;
    letter-spacing: 1px;
    min-width: 240px;
    min-height: 80px;
    -webkit-tap-highlight-color: transparent;
    z-index: 30;
    transition: transform 0.5s cubic-bezier(.34,1.78,.64,1);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .relaunch.show { transform: translateX(-50%) scale(1); }
  .relaunch:active {
    transform: translateX(-50%) scale(1) translateY(5px);
    box-shadow: 0 3px 0 #15803d, 0 5px 15px #00000033;
  }

  /* fireworks */
  .firework {
    position: fixed;
    pointer-events: none;
    font-size: clamp(28px, 5vw, 44px);
    z-index: 25;
    animation: fwBurst 1.2s ease-out forwards;
  }
  @keyframes fwBurst {
    0% { opacity: 0; transform: translate(0, 0) scale(0.4); }
    20% { opacity: 1; }
    100% { opacity: 0; transform: translate(var(--fx), var(--fy)) scale(1.5) rotate(360deg); }
  }

  /* tap puff */
  .tap-puff {
    position: fixed;
    pointer-events: none;
    z-index: 20;
    font-size: 24px;
    animation: tapPuff 0.5s ease-out forwards;
  }
  @keyframes tapPuff {
    0% { opacity: 1; transform: scale(0.5); }
    100% { opacity: 0; transform: scale(1.8) translateY(-30px); }
  }

  /* hint emoji */
  .hint {
    position: fixed;
    top: 18%;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Lilita One', sans-serif;
    font-size: clamp(28px, 6vw, 42px);
    color: #b45309;
    text-shadow: 3px 3px 0 #fde68a, 4px 4px 0 #00000022;
    z-index: 12;
    text-align: center;
    pointer-events: none;
    animation: hintBounce 1.4s ease-in-out infinite;
  }
  body.space .hint, .launching .hint { display: none; }
  @keyframes hintBounce {
    0%, 100% { transform: translateX(-50%) translateY(0) scale(1); }
    50% { transform: translateX(-50%) translateY(-8px) scale(1.05); }
  }
</style>
</head>
<body>

<div class="sky-deco">
  <span class="sun">☀️</span>
  <span class="cloud-bg">☁️</span>
  <span class="cloud-bg">☁️</span>
  <span class="cloud-bg">☁️</span>
</div>

<div class="space-deco" id="spaceDeco"></div>

<div class="hud" id="hud">🚀 Tap fast!</div>

<div class="hint" id="hint">👇 TAP TAP TAP! 👇</div>

<div class="gauge-wrap">
  <div class="gauge-label">FUEL</div>
  <div class="gauge"><div class="gauge-fill" id="gaugeFill"></div></div>
</div>

<div class="scene">
  <div class="ground"></div>
  <div class="moon" id="moon"><div class="moon-craters" id="craters"></div></div>
  <div class="pad" id="pad"></div>
  <div class="flames" id="flames">
    <div class="flame">🔥</div>
    <div class="smoke">💨</div>
  </div>
  <div class="rocket" id="rocket">🚀</div>
  <div class="flag" id="flag">🚩</div>
</div>

<div class="tap-zone" id="tapZone"></div>

<button class="relaunch" id="relaunch"><span>🚀</span>Launch Again!</button>

<script>
(() => {
  const gaugeFill = document.getElementById('gaugeFill');
  const rocket = document.getElementById('rocket');
  const flames = document.getElementById('flames');
  const tapZone = document.getElementById('tapZone');
  const relaunch = document.getElementById('relaunch');
  const flag = document.getElementById('flag');
  const hint = document.getElementById('hint');
  const hud = document.getElementById('hud');
  const spaceDeco = document.getElementById('spaceDeco');
  const craters = document.getElementById('craters');

  let fuel = 0;
  let launching = false;
  let drainInterval = null;

  // build space stars
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'space-star';
    s.textContent = Math.random() > 0.5 ? '✨' : '⭐';
    s.style.left = Math.random() * 100 + 'vw';
    s.style.top = Math.random() * 100 + 'vh';
    s.style.animationDelay = (Math.random() * 2) + 's';
    s.style.fontSize = (12 + Math.random() * 16) + 'px';
    spaceDeco.appendChild(s);
  }

  // craters on moon
  for (let i = 0; i < 8; i++) {
    const c = document.createElement('span');
    const size = 10 + Math.random() * 25;
    c.style.width = size + 'px';
    c.style.height = size + 'px';
    c.style.left = (10 + Math.random() * 80) + '%';
    c.style.top = (20 + Math.random() * 60) + '%';
    craters.appendChild(c);
  }

  function updateGauge() {
    fuel = Math.max(0, Math.min(100, fuel));
    gaugeFill.style.height = fuel + '%';
    // rocket shake intensity
    rocket.classList.remove('shake1','shake2','shake3');
    flames.style.opacity = '0';
    if (fuel > 15 && fuel <= 40) {
      rocket.classList.add('shake1');
      flames.style.opacity = '0.6';
      flames.style.transform = 'translateX(-50%) scale(0.6)';
    } else if (fuel > 40 && fuel <= 75) {
      rocket.classList.add('shake2');
      flames.style.opacity = '0.9';
      flames.style.transform = 'translateX(-50%) scale(0.85)';
    } else if (fuel > 75) {
      rocket.classList.add('shake3');
      flames.style.opacity = '1';
      flames.style.transform = 'translateX(-50%) scale(1.1)';
    } else {
      flames.style.transform = 'translateX(-50%) scale(0)';
    }
    if (fuel >= 100 && !launching) {
      launch();
    }
  }

  function startDrain() {
    if (drainInterval) return;
    drainInterval = setInterval(() => {
      if (!launching && fuel > 0) {
        fuel -= 1.6;
        updateGauge();
      }
    }, 120);
  }

  function tapPuff(x, y) {
    const p = document.createElement('div');
    p.className = 'tap-puff';
    const emojis = ['⭐','✨','💨','💛','🔥'];
    p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    p.style.left = (x - 12) + 'px';
    p.style.top = (y - 12) + 'px';
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 500);
  }

  function onTap(e) {
    if (launching) return;
    fuel += 6;
    updateGauge();
    const x = e.clientX || (e.touches && e.touches[0].clientX) || window.innerWidth/2;
    const y = e.clientY || (e.touches && e.touches[0].clientY) || window.innerHeight/2;
    tapPuff(x, y);
    startDrain();
  }

  tapZone.addEventListener('click', onTap);

  function launch() {
    launching = true;
    document.body.classList.add('launching');
    hint.style.display = 'none';
    hud.textContent = '🚀 BLAST OFF!';
    // Make rocket fly
    rocket.classList.remove('shake1','shake2','shake3');
    rocket.style.transition = 'bottom 3s cubic-bezier(.5,0,.7,.5), transform 0.5s';
    rocket.style.bottom = '120vh';
    flames.style.transition = 'bottom 3s cubic-bezier(.5,0,.7,.5), opacity 0.4s';
    flames.style.bottom = '105vh';

    // streaking stars
    const streakInt = setInterval(spawnStreak, 80);

    // transition to space
    setTimeout(() => {
      document.body.classList.add('space');
    }, 800);

    // After rocket "exits", reappear on moon
    setTimeout(() => {
      clearInterval(streakInt);
      // bring rocket back at top off-screen
      rocket.style.transition = 'none';
      rocket.style.bottom = '120vh';
      void rocket.offsetWidth;
      // animate down to moon
      rocket.style.transition = 'bottom 1.4s cubic-bezier(.4,0,.6,1)';
      rocket.style.bottom = '30%';
      flames.style.opacity = '0';
      flames.style.bottom = '14%';
    }, 3200);

    // bounce on moon
    setTimeout(() => {
      rocket.animate([
        { transform: 'translateX(-50%) scale(1) translateY(0)' },
        { transform: 'translateX(-50%) scale(1.1, 0.8) translateY(10px)', offset: 0.4 },
        { transform: 'translateX(-50%) scale(0.95, 1.1) translateY(-20px)', offset: 0.7 },
        { transform: 'translateX(-50%) scale(1) translateY(0)' }
      ], { duration: 700, easing: 'ease-out' });
    }, 4700);

    // plant flag + fireworks
    setTimeout(() => {
      flag.classList.add('show');
      fireworks();
    }, 5400);

    // show relaunch button
    setTimeout(() => {
      hud.textContent = '🌕 You made it!';
      relaunch.classList.add('show');
    }, 6200);
  }

  function spawnStreak() {
    const s = document.createElement('div');
    s.className = 'streak';
    s.textContent = Math.random() > 0.5 ? '✨' : '·';
    s.style.left = Math.random() * 100 + 'vw';
    s.style.top = '-30px';
    s.style.fontSize = (10 + Math.random() * 20) + 'px';
    s.style.color = 'white';
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 700);
  }

  function fireworks() {
    const emojis = ['🎆','🎇','🌟','⭐','✨','🎉','🎊','💫'];
    let n = 0;
    const fw = setInterval(() => {
      for (let i = 0; i < 5; i++) {
        const f = document.createElement('div');
        f.className = 'firework';
        f.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        f.style.left = (Math.random() * window.innerWidth) + 'px';
        f.style.top = (Math.random() * window.innerHeight * 0.6) + 'px';
        const a = Math.random() * Math.PI * 2;
        const d = 80 + Math.random() * 140;
        f.style.setProperty('--fx', Math.cos(a) * d + 'px');
        f.style.setProperty('--fy', Math.sin(a) * d + 'px');
        document.body.appendChild(f);
        setTimeout(() => f.remove(), 1300);
      }
      n++;
      if (n >= 8) clearInterval(fw);
    }, 350);
  }

  relaunch.addEventListener('click', () => {
    // reset everything
    launching = false;
    document.body.classList.remove('space');
    document.body.classList.remove('launching');
    flag.classList.remove('show');
    relaunch.classList.remove('show');
    hud.textContent = '🚀 Tap fast!';
    hint.style.display = '';
    fuel = 0;
    rocket.style.transition = 'none';
    rocket.style.bottom = '15%';
    void rocket.offsetWidth;
    rocket.style.transition = 'bottom 4s cubic-bezier(.5,0,.7,.5), transform 0.05s';
    flames.style.transition = 'opacity 0.3s, transform 0.3s';
    flames.style.bottom = '14%';
    flames.style.opacity = '0';
    updateGauge();
  });

  updateGauge();
})();
</script>
</body>
</html>
